services:
  - type: web
    name: rag-platform-backend
    runtime: node
    region: frankfurt
    rootDir: rag-platform/backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false

  - type: web
    name: rag-platform-frontend
    runtime: node
    region: frankfurt
    rootDir: rag-platform/frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "20"
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false  # Set to your backend Render URL e.g. https://rag-platform-backend.onrender.com
